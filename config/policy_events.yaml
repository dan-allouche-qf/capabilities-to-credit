# Country-level policy events drawn on figure timelines. The list is
# deliberately short and focused on events with sustained, documented
# macroeconomic impact (regime changes, fiscal frameworks, sanctions,
# currency reforms). Each entry feeds the policy-timeline figure and serves
# as a candidate treatment date for synthetic control / event-study designs.
#
# Fields
#   year   : integer year of the event
#   label  : short caption
#   category : one of {fiscal, monetary, reform, conflict, sanctions, treaty}

