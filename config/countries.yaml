    etf_inception: "1996-04"

  - iso3: RWA
    name: Rwanda
    groups: [EmergingAfrica]
    region: AFR
    tradable: false
    etf_ticker: null
    etf_inception: null

  - iso3: KEN
    name: Kenya
    groups: [EmergingAfrica]
    region: AFR
    tradable: false
    etf_ticker: null
    etf_inception: null
    note: "EM equity exposure available only via thinly-traded GAF; excluded from tradable universe."

  - iso3: MAR
