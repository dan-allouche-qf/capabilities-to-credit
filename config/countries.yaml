# Country universe. 13 focal emerging economies (BRICS, AES Sahel,
# Singapore, three Emerging-Africa middle-income cases, Pakistan) plus
# 10 extension EMs needed to obtain a credible cross-section in Part III
# (quintile sorts on 13 countries are uninformative).
#
# Fields
#   iso3        : ISO 3166 alpha-3 country code
#   name        : English short name
#   groups      : list of group tags (BRICS, AES, HighPerformers, EmergingAfrica,
#                 SouthAsia, Extension)
#   region      : World Bank region key (AFR, EAP, ECA, LAC, MENA, SAS, NAM)
#   tradable    : whether a liquid USD-denominated equity instrument exists
#   etf_ticker  : primary single-country ETF used in Part III backtest. Null
#                 when no liquid instrument exists (these countries are
#                 reported in the KPI / credit parts and excluded from the
#                 tradable universe).
#   etf_inception : first month the ETF is reasonably liquid (used to gate
#                   inclusion in the backtest universe).
#   note        : free-form provenance / caveat

focal:
  - iso3: BRA
    name: Brazil
    groups: [BRICS]
    region: LAC
    tradable: true
    etf_ticker: EWZ
    etf_inception: "2000-07"

  - iso3: RUS
    name: Russia
    groups: [BRICS]
    region: ECA
    tradable: true
    etf_ticker: RSX
    etf_inception: "2007-05"
    note: "ETF closed for redemptions February 2022; treat as -100% at delisting and remove from universe thereafter."

  - iso3: IND
    name: India
    groups: [BRICS]
    region: SAS
    tradable: true
    etf_ticker: INDA
    etf_inception: "2012-02"

  - iso3: CHN
