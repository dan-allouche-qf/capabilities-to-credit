    groups: [BRICS, HighPerformers]
    region: EAP
    tradable: true
    etf_ticker: MCHI
    etf_inception: "2011-04"
    note: "China is included in both BRICS and High Performers groups."

  - iso3: ZAF
    name: South Africa
    groups: [BRICS]
    region: AFR
    tradable: true
    etf_ticker: EZA
    etf_inception: "2003-02"

  - iso3: BFA
    name: Burkina Faso
